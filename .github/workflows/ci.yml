name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester v4
        shell: powershell
        run: Install-Module -Name Pester -MaximumVersion 4.10.1 -Force -SkipPublisherCheck -Scope CurrentUser
      - name: Run tests
        shell: powershell
        run: ./run_tests.ps1
